{% extends "base.html" %}
{% block title %}Login - BlogPlatform{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Log in to continue writing and commenting.</p>
    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="loginForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-checkbox">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('pages.register_page') }}">Sign up</a></p>
    <div class="demo-hint">
      <strong>Demo login:</strong> username <code>admin</code>, password <code>Password123!</code>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  if (!this.checkValidity()) { e.preventDefault(); return; }
  showSpinner();
});
</script>
{% endblock %}
